<!DOCTYPE html>
<html>
<head>
  <title>Mental Maths Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">

  <h1>Mental Maths Trainer</h1>

  <p>Select difficulty:</p>

  <button onclick="setDifficulty('easy', this)">Easy</button>
  <button onclick="setDifficulty('normal', this)">Normal</button>
  <button onclick="setDifficulty('hard', this)">Hard</button>
  <button onclick="setDifficulty('extreme', this)">Extreme</button>
  <button onclick="setDifficulty('insane', this)">Insane</button>

  <br><br>

  <button onclick="startGame()">Start Game</button>

  <p id="bestScore">Best: 0</p>

</div>

<!-- GAME SCREEN -->
<div id="gameScreen" style="display:none;">

  <p id="timer">Time: 60</p>
  <p id="score">Score: 0</p>

  <h2 id="question"></h2>

  <input id="answer" type="number" onkeydown="handleKeyPress(event)">
  <button onclick="checkAnswer()">Submit</button>

  <p id="result"></p>

</div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" style="display:none;">

  <h1>Game Over</h1>

  <p id="finalScore"></p>

  <button onclick="backToMenu()">← Back to Menu</button>

</div>

<script src="script.js"></script>

</body>
</html>
