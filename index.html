<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Maths Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="screen">
  <h1>Mental Maths</h1>

  <input id="playerName" placeholder="Enter name">

  <button onclick="setDifficulty('easy', this)">Easy</button>
  <button onclick="setDifficulty('normal', this)">Normal</button>
  <button onclick="setDifficulty('hard', this)">Hard</button>
  <button onclick="setDifficulty('extreme', this)">Extreme</button>
  <button onclick="setDifficulty('insane', this)">Insane</button>

  <br><br>

  <button onclick="startGame()">Start</button>
  <button onclick="showLeaderboard()">Leaderboard</button>
</div>

<div id="gameScreen" class="screen" style="display:none;">
  <h2 id="question"></h2>

  <input id="answer" onkeydown="handleKey(event)">

  <button onclick="checkAnswer()">Submit</button>

  <p id="timer"></p>
  <p id="score"></p>
  <p id="result"></p>
</div>

<div id="endScreen" class="screen" style="display:none;">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="backToMenu()">Back</button>
</div>

<div id="leaderboardScreen" class="screen" style="display:none;">
  <h2 id="leaderboardTitle"></h2>
  <div id="leaderboardList"></div>
  <button onclick="backToMenu()">Back</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
