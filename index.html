<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mental Maths Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">

  <div class="card">

    <h1>Mental Maths Trainer</h1>

    <input id="playerName" type="text" placeholder="Enter your name">

    <h3>Select Difficulty</h3>

    <div class="buttonGrid">

      <button onclick="setDifficulty('easy', this)">Easy</button>
      <button onclick="setDifficulty('normal', this)">Normal</button>
      <button onclick="setDifficulty('hard', this)">Hard</button>
      <button onclick="setDifficulty('extreme', this)">Extreme</button>
      <button onclick="setDifficulty('insane', this)">Insane</button>

    </div>

    <br>

    <button class="startBtn" onclick="startGame()">Start Game</button>

    <button class="secondaryBtn" onclick="showScreen('leaderboardScreen')">
      Leaderboard
    </button>

  </div>

</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">

  <div class="card">

    <div class="topBar">
      <p id="timer">Time: 60</p>
      <p id="score">Score: 0</p>
    </div>

    <h2 id="question">Question</h2>

    <input id="answer" type="number" onkeydown="handleKey(event)">

    <br><br>

    <button onclick="checkAnswer()">Submit</button>

    <p id="result"></p>

  </div>

</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen">

  <div class="card">

    <h1>Game Over</h1>

    <p id="finalScore"></p>

    <button onclick="backToMenu()">Back to Menu</button>

  </div>

</div>

<!-- LEADERBOARD -->
<div id="leaderboardScreen" class="screen">

  <div class="card">

    <h2 id="leaderboardTitle">Leaderboard</h2>

    <div id="leaderboardList"></div>

    <br>

    <button onclick="backToMenu()">Back to Menu</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
